<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Price Prediction</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">

    <style>
        body {
            background-image: url("https://images.unsplash.com/photo-1542450256-2dd6d209ff85?ixlib=rb-1.2.1&auto=format&fit=crop&w=967&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Dark overlay over background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        nav.navbar {
            background: rgba(20, 20, 40, 0.92) !important;
            border-bottom: 2px solid #CB202D;
            z-index: 10;
        }

        nav h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin: 8px 0;
            letter-spacing: 1px;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding-top: 90px;
            padding-bottom: 40px;
        }

        /* Card styling — semi-transparent dark */
        .card {
            background: rgba(15, 20, 40, 0.82) !important;
            border: 1px solid rgba(203, 32, 45, 0.4) !important;
            border-radius: 10px !important;
            backdrop-filter: blur(6px);
            margin-bottom: 20px;
        }

        .card-title {
            color: #f0a500 !important;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Dropdowns and inputs */
        select, input[type="datetime-local"] {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            color: #ffffff !important;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input[type="datetime-local"]:focus {
            border-color: #CB202D;
            background: rgba(255, 255, 255, 0.12);
        }

        select option {
            background: #1a1a2e;
            color: #ffffff;
        }

        /* datetime-local text color fix for Chrome */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* Predict button */
        .btn-predict {
            background: linear-gradient(135deg, #CB202D, #ff5252);
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-predict:hover {
            background: linear-gradient(135deg, #ff5252, #CB202D);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(203, 32, 45, 0.5);
        }

        /* Result box */
        .result-box {
            background: rgba(203, 32, 45, 0.15);
            border: 1px solid #CB202D;
            border-radius: 10px;
            padding: 20px;
            margin-top: 25px;
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 1px;
        }

        .footer-text {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <h1>✈ Predict Flight Price</h1>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <form action="/predict" method="post">

            <!-- Row 1: Source & Destination -->
            <div class="row">
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">🛫 Source</h5>
                            <select name="Source" id="Source" required>
                                <option value="Mumbai">Mumbai</option>
                                <option value="Kolkata">Kolkata</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Chennai">Chennai</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">🛬 Destination</h5>
                            <select name="Destination" id="Destination" required>
                                <option value="Delhi">Delhi</option>
                                <option value="Cochin">Cochin</option>
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Kolkata">Kolkata</option>
                                <option value="New Delhi">New Delhi</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 2: Departure & Arrival -->
            <div class="row">
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">🕐 Departure Date & Time</h5>
                            <input type="datetime-local" name="Dep_Time" id="Dep_Time" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">🕓 Arrival Date & Time</h5>
                            <input type="datetime-local" name="Arrival_Time" id="Arrival_Time" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 3: Airline & Stops -->
            <div class="row">
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">✈ Airline</h5>
                            <select name="airline" id="airline" required>
                                <option value="Air India">Air India</option>
                                <option value="GoAir">GoAir</option>
                                <option value="IndiGo">IndiGo</option>
                                <option value="Jet Airways">Jet Airways</option>
                                <option value="Jet Airways Business">Jet Airways Business</option>
                                <option value="Multiple carriers">Multiple carriers</option>
                                <option value="Multiple carriers Premium economy">Multiple carriers Premium economy</option>
                                <option value="SpiceJet">SpiceJet</option>
                                <option value="Trujet">Trujet</option>
                                <option value="Vistara">Vistara</option>
                                <option value="Vistara Premium economy">Vistara Premium economy</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">🔁 Stops</h5>
                            <select name="stops" required>
                                <option value="0">Non-Stop</option>
                                <option value="1">1 Stop</option>
                                <option value="2">2 Stops</option>
                                <option value="3">3 Stops</option>
                                <option value="4">4 Stops</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-predict">🔍 Predict Price</button>

        </form>

        <!-- Result -->
        {% if prediction_text %}
        <div class="result-box">
            💰 {{ prediction_text }}
        </div>
        {% endif %}

        <p class="footer-text">©2020 Total Data Science</p>
    </div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" crossorigin="anonymous"></script>

</body>
</html>
